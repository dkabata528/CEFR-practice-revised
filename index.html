<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>English Boarding Pass — Advanced (B2–C2)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

.epx-root {
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  background: #0B1729;
  color: #F3EFE4;
  min-height: 100vh;
  padding: 28px 14px 60px;
}
.epx-wrap { max-width: 720px; margin: 0 auto; }

.epx-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.65;
}
.epx-display { font-family: 'Space Grotesk', sans-serif; }
.epx-mono { font-family: 'JetBrains Mono', monospace; }

.epx-ticket {
  background: #F3EFE4;
  color: #12213D;
  border-radius: 20px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  position: relative;
}
.epx-ticket-top { padding: 22px 24px 18px; }
.epx-perf-row { position: relative; height: 0; }
.epx-punch { position: absolute; top: -13px; width: 26px; height: 26px; border-radius: 50%; background: #0B1729; }
.epx-punch.left { left: -13px; }
.epx-punch.right { right: -13px; }
.epx-perf-line { border-top: 2px dashed rgba(18,33,61,0.28); margin: 0 22px; }
.epx-ticket-bottom { padding: 18px 24px 22px; }

.epx-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid rgba(18,33,61,0.25);
  background: transparent;
  color: #12213D;
  cursor: pointer;
  letter-spacing: 0.03em;
}
.epx-chip.active { background: #12213D; color: #F3EFE4; border-color: #12213D; }

.epx-gatenav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 20px 0; }
.epx-gate-btn {
  background: #12213D; color: #F3EFE4;
  border: 1px solid rgba(243,239,228,0.12);
  border-radius: 14px; padding: 12px 6px; text-align: center; cursor: pointer;
}
.epx-gate-btn.active { background: #E8A33D; color: #12213D; border-color: #E8A33D; }
.epx-gate-letter { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700; display: block; }
.epx-gate-label { font-size: 10.5px; margin-top: 3px; display: block; }

.epx-card { background: #F3EFE4; color: #12213D; border-radius: 16px; padding: 22px; }

.epx-btn {
  font-family: 'Space Grotesk', sans-serif; font-weight: 600;
  border-radius: 10px; padding: 10px 18px; cursor: pointer; border: none; font-size: 14px;
}
.epx-btn-primary { background: #12213D; color: #F3EFE4; }
.epx-btn-secondary { background: transparent; color: #12213D; border: 1px solid rgba(18,33,61,0.3); }
.epx-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.epx-tabbar { display: flex; gap: 8px; margin-bottom: 18px; }

.epx-flashcard {
  margin-top: 12px; min-height: 150px;
  border: 1px solid rgba(18,33,61,0.15); border-radius: 14px; padding: 22px;
  cursor: pointer; display: flex; flex-direction: column; justify-content: center;
}

.epx-choice {
  display: block; width: 100%; text-align: left;
  padding: 12px 16px; margin-bottom: 8px; border-radius: 10px;
  border: 1px solid rgba(18,33,61,0.2);
  background: #fff; cursor: pointer; font-size: 14px; color: #12213D;
}
.epx-choice.correct { background: #2F6E68; border-color: #2F6E68; color: #fff; }
.epx-choice.incorrect { background: #C1553F; border-color: #C1553F; color: #fff; }
.epx-choice.dim { opacity: 0.5; }

.epx-passage-btn {
  display: block; width: 100%; text-align: left; padding: 16px; margin-bottom: 10px;
  border-radius: 12px; border: 1px solid rgba(18,33,61,0.15); background: #fff; cursor: pointer;
}

.epx-progress-track { height: 8px; background: rgba(18,33,61,0.12); border-radius: 999px; overflow: hidden; }
.epx-progress-fill { height: 100%; background: #2F6E68; }

.epx-barcode { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
.epx-bar { background: #12213D; opacity: 0.7; }

/* Instructor-style explanation panel */
.epx-explain {
  margin-top: 12px; margin-bottom: 16px;
  border-left: 3px solid rgba(18,33,61,0.15);
  padding: 12px 10px 12px 14px;
  background: rgba(18,33,61,0.03);
  border-radius: 0 8px 8px 0;
}
.epx-explain-row { font-size: 13.5px; line-height: 1.75; margin-bottom: 10px; }
.epx-explain-row:last-child { margin-bottom: 0; }
.epx-explain-tag {
  display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 5px; margin-right: 6px; vertical-align: 2px;
  white-space: nowrap;
}
.epx-explain-tag.correct { background: rgba(47,110,104,0.16); color: #2F6E68; }
.epx-explain-tag.wrong { background: rgba(193,85,63,0.16); color: #C1553F; }
.epx-explain-tag.tip { background: rgba(232,163,61,0.22); color: #9C6423; }
.epx-explain-tag.example { background: rgba(18,33,61,0.08); color: #5B5F66; }
</style>
</head>
<body>
<div class="epx-root"><div id="app" class="epx-wrap"></div></div>

<script>
/* ------------------------------------------------------------------ */

var QUIZ_SIZE = 10; /* number of questions sampled per quiz session (vocab & grammar) */

/* Data: Vocabulary (90 words: 30 x B2 / C1 / C2)                       */
/* ------------------------------------------------------------------ */

var VOCAB = [
  { id:'v1', level:'B2', topic:'Business', word:'corroborate', pos:'v.', ja:'裏付ける', example:"The witness's statement helped corroborate the initial findings.", exampleJa:'証人の証言は当初の調査結果を裏付けるのに役立った。',
    note:'「他の証拠によって裏付ける」という意味の、ややフォーマルな動詞です。corroborate a claim / corroborate evidence のように使われ、confirm よりも「独立した別の情報源が一致することを示す」というニュアンスが強い語です。' },
  { id:'v2', level:'B2', topic:'Business', word:'undermine', pos:'v.', ja:'弱体化させる、損なう', example:'Constant criticism can undermine team morale.', exampleJa:'絶え間ない批判はチームの士気を損なう可能性がある。',
    note:'「徐々に、間接的に弱める」という意味で、undermine confidence / undermine authority のようにセットで覚えると便利です。内部から蝕むイメージの語です。' },
  { id:'v3', level:'B2', topic:'General', word:'plausible', pos:'adj.', ja:'もっともらしい', example:"Her explanation for the delay sounded plausible.", exampleJa:'遅延に関する彼女の説明はもっともらしく聞こえた。',
    note:'「一見もっともらしいが、真偽は定かでない」という含みを持つ形容詞です。correct や true とは使い分けが必要です。' },
  { id:'v4', level:'B2', topic:'Business', word:'discretion', pos:'n.', ja:'裁量', example:"The manager has full discretion over the budget allocation.", exampleJa:'マネージャーは予算配分について全面的な裁量権を持っている。',
    note:"at the manager's discretion（マネージャーの裁量で）のような形でよく使われます。「思慮深さ、口の堅さ」という意味の use discretion も便利です。" },
  { id:'v5', level:'B2', topic:'Business', word:'leverage', pos:'n./v.', ja:'てこの作用、活用する', example:'The company used its market position to leverage better terms.', exampleJa:'その会社は市場での地位を活用してより良い条件を引き出した。',
    note:'「（自分の持つ強みを）最大限に活用する」という比喩的な意味の動詞。leverage a relationship / leverage data のようにビジネス英語で非常に頻出です。' },
  { id:'v6', level:'B2', topic:'Business', word:'contingency', pos:'n.', ja:'不測の事態', example:'We need a contingency plan in case the shipment is delayed.', exampleJa:'出荷が遅れた場合に備えて不測の事態への対応計画が必要だ。',
    note:'常に plan とセットで a contingency plan（緊急時対応計画）という形で使われることがほとんどです。' },
  { id:'v7', level:'B2', topic:'Business', word:'streamline', pos:'v.', ja:'効率化する', example:'The new software helped streamline the approval process.', exampleJa:'新しいソフトウェアは承認プロセスの効率化に役立った。',
    note:'複雑な手続きをシンプルにするニュアンスがあり、simplify よりも業務改善の文脈でよく使われます。' },
  { id:'v8', level:'B2', topic:'General', word:'resilient', pos:'adj.', ja:'回復力のある', example:'The economy proved resilient despite the downturn.', exampleJa:'経済は景気後退にもかかわらず回復力を示した。',
    note:'名詞形 resilience（回復力）も合わせて覚えておくと表現の幅が広がります。' },
  { id:'v9', level:'B2', topic:'General', word:'subsequent', pos:'adj.', ja:'その後の', example:'The subsequent meeting addressed the remaining issues.', exampleJa:'その後の会議で残りの課題が話し合われた。',
    note:'later よりもフォーマルでレポートで頻出。subsequent to（〜の後に）という前置詞的な使い方もあります。' },
  { id:'v10', level:'B2', topic:'Business', word:'viable', pos:'adj.', ja:'実行可能な', example:'Is remote work a viable option for this role?', exampleJa:'この職務においてリモートワークは実行可能な選択肢だろうか。',
    note:'possible よりも実現性の高さを強調したいときに使う形容詞です。a viable business model のように使います。' },
  { id:'v11', level:'B2', topic:'Business', word:'facilitate', pos:'v.', ja:'促進する、容易にする', example:'The new software facilitates communication between departments.', exampleJa:'新しいソフトウェアは部門間のコミュニケーションを促進する。',
    note:'help よりもフォーマルでビジネス文書に頻出。facilitate a discussion/process のように使われます。' },
  { id:'v12', level:'B2', topic:'Legal', word:'comply', pos:'v.', ja:'従う、遵守する', example:'All staff must comply with the new safety regulations.', exampleJa:'全社員は新しい安全規則を遵守しなければならない。',
    note:'comply with ~ の形で使います。obey よりもフォーマルで、規則・法令の文脈で使われます。' },
  { id:'v13', level:'B2', topic:'Business', word:'entail', pos:'v.', ja:'伴う、必要とする', example:'The new role entails significant travel.', exampleJa:'その新しい役職はかなりの出張を伴う。',

  { id:'v14', level:'B2', topic:'Business', word:'deploy', pos:'v.', ja:'配備する、展開する', example:'The company plans to deploy the new system next quarter.', exampleJa:'会社は来四半期に新しいシステムを展開する予定だ。',

  { id:'v16', level:'B2', topic:'Legal', word:'dispute', pos:'n./v.', ja:'紛争、争う', example:'The two companies are locked in a legal dispute over patent rights.', exampleJa:'両社は特許権を巡る法的紛争のさなかにある。',

  { id:'v17', level:'B2', topic:'General', word:'allege', pos:'v.', ja:'主張する、申し立てる', example:'The report alleges that funds were misused.', exampleJa:'その報告書は資金が不正に使用されたと主張している。',

  { id:'v18', level:'B2', topic:'General', word:'render', pos:'v.', ja:'〜にする、提供する', example:'The error rendered the entire report unreliable.', exampleJa:'そのミスは報告書全体を信頼できないものにした。',
    note:'render + O + C で「OをCの状態にする」という意味。make よりフォーマル。render a service（サービスを提供する）という意味もあります。' },
  { id:'v19', level:'B2', topic:'General', word:'impede', pos:'v.', ja:'妨げる', example:'Heavy traffic impeded the delivery schedule.', exampleJa:'激しい交通渋滞が配送スケジュールを妨げた。',
    note:'hinder とほぼ同義。impede progress のように使われます。' },
  { id:'v20', level:'B2', topic:'Business', word:'inclusive', pos:'adj.', ja:'すべてを含んだ、包括的な', example:'The price is inclusive of tax and service charges.', exampleJa:'その価格には税とサービス料が含まれている。',
    note:'be inclusive of ~ で「〜を含んだ」の意味。組織文化の文脈では an inclusive workplace のように「（多様性を）受け入れる」の意味でも頻出です。' },
  { id:'v21', level:'B2', topic:'General', word:'presumably', pos:'adv.', ja:'おそらく', example:'Presumably, the delay was caused by the shipping strike.', exampleJa:'おそらく、その遅延は輸送ストライキが原因だった。',
    note:'probably よりもやや形式ばった、論理的推測を示す副詞です。' },
  { id:'v22', level:'B2', topic:'General', word:'prevalent', pos:'adj.', ja:'広く見られる、普及した', example:'Remote work has become prevalent across many industries.', exampleJa:'リモートワークは多くの業界で広く見られるようになった。',
    note:'common よりもフォーマル。prevalent among/in のように使われます。' },
  { id:'v23', level:'B2', topic:'General', word:'verify', pos:'v.', ja:'検証する', example:'Please verify the figures before submitting the report.', exampleJa:'報告書を提出する前に数字を検証してください。',

  { id:'v24', level:'B2', topic:'Business', word:'jeopardize', pos:'v.', ja:'危険にさらす', example:'A single mistake could jeopardize the entire deal.', exampleJa:'一つのミスが取引全体を危険にさらしかねない。',
    note:'risk よりも「取り返しのつかない損失につながりうる」という深刻なニュアンスがあります。' },
  { id:'v25', level:'B2', topic:'Business', word:'endorse', pos:'v.', ja:'支持する、承認する', example:'The board formally endorsed the new strategy.', exampleJa:'取締役会は新戦略を正式に承認した。',
    note:'support よりもフォーマルで、公式な承認・推薦のニュアンスがあります。' },
  { id:'v26', level:'B2', topic:'General', word:'controversy', pos:'n.', ja:'論争', example:'The proposal sparked considerable controversy among stakeholders.', exampleJa:'その提案は関係者の間でかなりの論争を引き起こした。',

  { id:'v27', level:'B2', topic:'Legal', word:'mandate', pos:'n./v.', ja:'権限、義務付ける', example:'The new regulation mandates annual safety inspections.', exampleJa:'新しい規制は年次の安全点検を義務付けている。',

  { id:'v28', level:'B2', topic:'General', word:'underlying', pos:'adj.', ja:'根底にある', example:'The report fails to address the underlying causes of the problem.', exampleJa:'その報告書は問題の根本的な原因に触れていない。',

  { id:'v29', level:'B2', topic:'General', word:'adverse', pos:'adj.', ja:'不利な、有害な', example:'The medication may have adverse effects on some patients.', exampleJa:'その薬は一部の患者に有害な影響を与える可能性がある。',

  { id:'v30', level:'B2', topic:'Legal', word:'constitute', pos:'v.', ja:'構成する、〜にあたる', example:'This behavior may constitute a breach of contract.', exampleJa:'この行為は契約違反にあたる可能性がある。',

var DEFAULT_PROGRESS = {
  level: 'ALL', vocabKnownIds: [], vocabQuizAttempts: [], grammarAttempts: [], readingAttempts: [], streak: 0, lastStudyDate: null,
};

/* ------------------------------------------------------------------ */
/* State & storage                                                      */
/* ------------------------------------------------------------------ */

var STORAGE_KEY = 'epx-b2c2-progress-v3';

function defaultProgress() {
  return { level:'ALL', vocabKnownIds:[], vocabQuizAttempts:[], grammarAttempts:[], readingAttempts:[], streak:0, lastStudyDate:null };
}
function loadProgress() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return Object.assign(defaultProgress(), JSON.parse(raw));
  } catch (e) { /* no saved progress yet, or storage unavailable */ }
  return defaultProgress();
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S.progress)); }
  catch (e) { console.error('Failed to save progress', e); }
}
function todayStr() { return new Date().toISOString().slice(0,10); }

function recordActivity(partial) {
  var today = todayStr();
  var streak = S.progress.streak;
  if (S.progress.lastStudyDate !== today) {
    var y = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    streak = (S.progress.lastStudyDate === y) ? S.progress.streak + 1 : 1;
  }
  Object.assign(S.progress, partial, { streak: streak, lastStudyDate: today });
  saveProgress();
}

var S = {
  tab: 'vocab',
  progress: loadProgress(),
  vocab: { mode:'flashcard', index:0, flipped:false, quiz:null, qIndex:0, selected:null, score:0, finished:false },
  grammar: { session:null, qIndex:0, selected:null, answers:[], finished:false },
  reading: { selectedId:null, answers:{} },
};

function setLevel(level) {
  S.progress.level = level;
  saveProgress();
  S.vocab = { mode:'flashcard', index:0, flipped:false, quiz:null, qIndex:0, selected:null, score:0, finished:false };
  S.grammar = { session:null, qIndex:0, selected:null, answers:[], finished:false };
  render();
}

/* ------------------------------------------------------------------ */
/* Helpers                                                              */
/* ------------------------------------------------------------------ */

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function buildVocabQuiz(pool, count) {
  var items = shuffle(pool).slice(0, count);
  return items.map(function(item){
    var distractors = shuffle(pool.filter(function(v){ return v.id !== item.id; })).slice(0,3);
    var choices = shuffle([item].concat(distractors));
    return {
      id: item.id, promptJa: item.ja,
      choices: choices.map(function(c){ return { id:c.id, word:c.word }; }),
      answerId: item.id,
    };
  });
}
function vocabPool() {
  var level = S.progress.level;
  return VOCAB.filter(function(v){ return level==='ALL' || v.level===level; });
}
function grammarAllPool() {
  var level = S.progress.level;
  return GRAMMAR.filter(function(g){ return level==='ALL' || g.level===level; });
}
function getVocabById(id) {
  for (var i=0;i<VOCAB.length;i++) if (VOCAB[i].id===id) return VOCAB[i];
  return null;
}
function computeReadiness() {
  var p = S.progress;
  var vocabPct = VOCAB.length ? (p.vocabKnownIds.length / VOCAB.length) * 100 : 0;
  var gAtt = p.grammarAttempts.slice(-3);
  var grammarPct = gAtt.length ? gAtt.reduce(function(s,a){return s+a.score/a.total;},0) / gAtt.length * 100 : null;
  var rAtt = p.readingAttempts.slice(-3);
  var readingPct = rAtt.length ? rAtt.reduce(function(s,a){return s+a.score/a.total;},0) / rAtt.length * 100 : null;
  var parts = [vocabPct, grammarPct, readingPct].filter(function(x){ return x!==null && x!==undefined; });
  if (!parts.length) return 0;
  return Math.round(parts.reduce(function(a,b){return a+b;},0) / parts.length);
}

function renderExplanation(e) {
  var html = '<div class="epx-explain">';
  html += '<div class="epx-explain-row"><span class="epx-explain-tag correct">正解の理由</span>' + e.correct + '</div>';
  if (e.wrong) html += '<div class="epx-explain-row"><span class="epx-explain-tag wrong">他の選択肢</span>' + e.wrong + '</div>';
  if (e.tip) html += '<div class="epx-explain-row"><span class="epx-explain-tag tip">ワンポイント</span>' + e.tip + '</div>';
  html += '</div>';
  return html;
}
function renderVocabExplanation(item) {
  var html = '<div class="epx-explain">';
  html += '<div class="epx-explain-row"><span class="epx-explain-tag correct">正解</span><strong>' + item.word + '</strong>（' + item.pos + '）— ' + item.ja + '</div>';
  html += '<div class="epx-explain-row"><span class="epx-explain-tag tip">講師解説</span>' + item.note + '</div>';
  html += '<div class="epx-explain-row"><span class="epx-explain-tag example">例文</span>' + item.example + '<br><span style="opacity:.65;">' + item.exampleJa + '</span></div>';
  html += '</div>';
  return html;
}

    + '</div>';

    var current = pool[v.index];
    var known = S.progress.vocabKnownIds.indexOf(current.id) !== -1;
    html += '<div class="epx-eyebrow">' + (v.index+1) + ' / ' + pool.length + ' ・ ' + current.level + ' ・ ' + current.topic + '</div>';
    html += '<div class="epx-flashcard" data-action="flip-card">';

  } else {
    if (!v.quiz) {
      html += '<div style="text-align:center;padding:20px 0;"><p style="margin-bottom:16px;">この範囲(全' + pool.length + '語)から' + Math.min(QUIZ_SIZE,pool.length) + '問をランダムに出題します。</p>'
        + '<button class="epx-btn epx-btn-primary" data-action="start-vocab-quiz">クイズを始める</button></div>';
    } else if (!v.finished) {
      var q = v.quiz[v.qIndex];
      html += '<div class="epx-eyebrow">Q ' + (v.qIndex+1) + ' / ' + v.quiz.length + '</div>'
        + '<div class="epx-progress-track" style="margin:8px 0 18px;"><div class="epx-progress-fill" style="width:' + ((v.qIndex/v.quiz.length)*100) + '%;"></div></div>'
        + '<div class="epx-display" style="font-size:18px;font-weight:700;margin-bottom:16px;">「' + q.promptJa + '」を表す単語は？</div>';
      q.choices.forEach(function(c){
        var cls = 'epx-choice';
        if (v.selected !== null) {
          if (c.id === q.answerId) cls += ' correct';
          else if (c.id === v.selected) cls += ' incorrect';
          else cls += ' dim';
        }
        html += '<button class="' + cls + '" data-action="select-vocab-answer" data-choice="' + c.id + '" ' + (v.selected!==null?'disabled':'') + '>' + c.word + '</button>';
      });
      if (v.selected !== null) {
        var correctItem = getVocabById(q.answerId);
        html += renderVocabExplanation(correctItem);
        html += '<button class="epx-btn epx-btn-primary" data-action="next-vocab-question">' + (v.qIndex+1>=v.quiz.length?'結果を見る':'次の問題へ') + '</button>';
      }
    } else {
      html += '<div style="text-align:center;padding:20px 0;"><div class="epx-eyebrow">RESULT</div>'
        + '<div class="epx-display" style="font-size:32px;font-weight:700;margin:8px 0;">' + v.score + ' / ' + v.quiz.length + '</div>'
        + '<button class="epx-btn epx-btn-primary" data-action="start-vocab-quiz">もう一度（新しい問題セット）</button></div>';
    }
  }
  return html;
}

function buildGrammarTab() {
  var allPool = grammarAllPool();
  if (!allPool.length) return '<div>該当する問題がありません。</div>';
  var g = S.grammar;

  if (!g.session) {
    return '<div style="text-align:center;padding:20px 0;"><p style="margin-bottom:16px;">この範囲(全' + allPool.length + '問)から' + Math.min(QUIZ_SIZE, allPool.length) + '問をランダムに出題します。</p>'
      + '<button class="epx-btn epx-btn-primary" data-action="start-grammar-quiz">クイズを始める</button></div>';
  }

  if (g.finished) {
    var finalScore = g.answers.filter(function(a){return a.correct;}).length;
    var wrong = g.answers.filter(function(a){return !a.correct;});
    var html = '<div style="text-align:center;padding:12px 0 24px;"><div class="epx-eyebrow">RESULT</div>'
      + '<div class="epx-display" style="font-size:32px;font-weight:700;margin:8px 0;">' + finalScore + ' / ' + g.session.length + '</div>'
      + '<button class="epx-btn epx-btn-primary" data-action="restart-grammar-quiz">もう一度（新しい問題セット）</button></div>';
    if (wrong.length) {
      html += '<div class="epx-eyebrow" style="margin-bottom:8px;">復習ポイント</div>';
      wrong.forEach(function(w){
        html += '<div style="border:1px solid rgba(18,33,61,.15);border-radius:10px;padding:14px;margin-bottom:12px;">'
          + '<div style="font-size:14px;font-weight:700;">' + w.item.sentence.replace('___', '【' + w.item.choices[w.item.answerIndex] + '】') + '</div>'
          + renderExplanation(w.item.explain)
          + '</div>';
      });
    }
    return html;
  }

  var current = g.session[g.qIndex];
  var parts = current.sentence.split('___');
  var html2 = '<div class="epx-eyebrow">Q ' + (g.qIndex+1) + ' / ' + g.session.length + ' ・ ' + current.level + '</div>'
    + '<div class="epx-progress-track" style="margin:8px 0 18px;"><div class="epx-progress-fill" style="width:' + ((g.qIndex/g.session.length)*100) + '%;"></div></div>'
    + '<div style="font-size:17px;line-height:1.7;margin-bottom:16px;">' + parts[0] + '<span class="epx-mono" style="border-bottom:2px solid #12213D;padding:0 6px;">______</span>' + parts[1] + '</div>';
  current.choices.forEach(function(c,i){
    var cls = 'epx-choice';
    if (g.selected !== null) {
      if (i===current.answerIndex) cls += ' correct';
      else if (i===g.selected) cls += ' incorrect';
      else cls += ' dim';
    }
    html2 += '<button class="' + cls + '" data-action="select-grammar-answer" data-index="' + i + '" ' + (g.selected!==null?'disabled':'') + '>' + String.fromCharCode(97+i) + ') ' + c + '</button>';
  });
  if (g.selected !== null) {
    html2 += renderExplanation(current.explain);
    html2 += '<button class="epx-btn epx-btn-primary" data-action="next-grammar-question">' + (g.qIndex+1>=g.session.length?'結果を見る':'次の問題へ') + '</button>';
  }
  return html2;
}

function buildReadingTab() {
  var r = S.reading;
  if (!r.selectedId) {
    var html = '<div class="epx-eyebrow" style="margin-bottom:10px;">READING PASSAGES</div>';
    READING.forEach(function(p){
      var attempts = S.progress.readingAttempts.filter(function(a){return a.passageId===p.id;});
      var best = attempts.length ? Math.max.apply(null, attempts.map(function(a){return Math.round(a.score/a.total*100);})) : null;
      html += '<button class="epx-passage-btn" data-action="select-passage" data-id="' + p.id + '">'
        + '<div style="display:flex;justify-content:space-between;"><div class="epx-display" style="font-weight:700;">' + p.title + '</div>'
        + '<div class="epx-mono" style="font-size:12px;opacity:.6;">' + p.level + '</div></div>'
        + '<div style="font-size:13px;opacity:.6;margin-top:4px;">設問' + p.questions.length + '問' + (best!==null?' ・ 自己ベスト ' + best + '%':'') + '</div></button>';
    });
    return html;
  }
  var passage = READING.filter(function(p){return p.id===r.selectedId;})[0];
  var score = passage.questions.filter(function(q,i){return r.answers[i]===q.answerIndex;}).length;
  var allAnswered = passage.questions.every(function(q,i){return r.answers[i]!==undefined;});
  var html2 = '<button class="epx-btn epx-btn-secondary" style="margin-bottom:14px;" data-action="back-to-passages">← 一覧に戻る</button>'
    + '<div class="epx-eyebrow">' + passage.level + '</div>'
    + '<div class="epx-display" style="font-size:19px;font-weight:700;margin:6px 0 14px;">' + passage.title + '</div>'
    + '<div style="font-size:14px;line-height:1.8;white-space:pre-line;background:#fff;border:1px solid rgba(18,33,61,.12);border-radius:12px;padding:18px;margin-bottom:20px;">' + passage.text + '</div>';
  passage.questions.forEach(function(q,qi){
    html2 += '<div style="margin-bottom:20px;"><div style="font-weight:700;margin-bottom:8px;">' + (qi+1) + '. ' + q.q + '</div>';
    q.choices.forEach(function(c,ci){
      var sel = r.answers[qi];
      var cls = 'epx-choice';
      if (sel !== undefined) {
        if (ci===q.answerIndex) cls += ' correct';
        else if (ci===sel) cls += ' incorrect';
        else cls += ' dim';
      }
      html2 += '<button class="' + cls + '" data-action="select-reading-answer" data-qi="' + qi + '" data-ci="' + ci + '" ' + (sel!==undefined?'disabled':'') + '>' + String.fromCharCode(97+ci) + ') ' + c + '</button>';
    });
    if (r.answers[qi] !== undefined) html2 += renderExplanation(q.explain);
    html2 += '</div>';
  });
  if (allAnswered) {
    html2 += '<div style="text-align:center;padding:12px 0;"><div class="epx-display" style="font-size:22px;font-weight:700;">スコア: ' + score + ' / ' + passage.questions.length + '</div></div>';
  }
  return html2;
}

function statBlock(label,value,sub){
  return '<div style="border:1px solid rgba(18,33,61,.12);border-radius:12px;padding:16px;">'
    + '<div style="font-size:12px;opacity:.6;">' + label + '</div>'
    + '<div class="epx-display" style="font-size:23px;font-weight:700;margin:4px 0;">' + value + '</div>'
    + '<div style="font-size:11px;opacity:.5;">' + sub + '</div></div>';
}
function buildProgressTab() {
  var p = S.progress;
  var vocabPct = Math.round((p.vocabKnownIds.length / VOCAB.length) * 100);
  var grammarAvg = p.grammarAttempts.length ? Math.round(p.grammarAttempts.reduce(function(s,a){return s+a.score/a.total;},0)/p.grammarAttempts.length*100) : null;
  var readingCompleted = {};
  p.readingAttempts.forEach(function(a){ readingCompleted[a.passageId]=true; });
  var readingCompletedCount = Object.keys(readingCompleted).length;
  var readingAvg = p.readingAttempts.length ? Math.round(p.readingAttempts.reduce(function(s,a){return s+a.score/a.total;},0)/p.readingAttempts.length*100) : null;
  return '<div class="epx-eyebrow" style="margin-bottom:14px;">LEARNING RECORD</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    + statBlock('語彙 習得率', vocabPct+'%', p.vocabKnownIds.length + ' / ' + VOCAB.length + '語')
    + statBlock('文法 平均正答率', grammarAvg!==null?grammarAvg+'%':'—', p.grammarAttempts.length + '回挑戦')
    + statBlock('リーディング 平均正答率', readingAvg!==null?readingAvg+'%':'—', readingCompletedCount + ' / ' + READING.length + '文章完了')
    + statBlock('継続日数', p.streak+'日', p.lastStudyDate?('最終学習: ' + p.lastStudyDate):'未学習')
    + '</div>'
    + '<button class="epx-btn epx-btn-secondary" style="margin-top:24px;" data-action="reset-progress">学習記録をリセット</button>';
}

/* ------------------------------------------------------------------ */
/* Render + event dispatch                                              */
/* ------------------------------------------------------------------ */

function render() {
  var body = '';
  if (S.tab === 'vocab') body = buildVocabTab();
  else if (S.tab === 'grammar') body = buildGrammarTab();
  else if (S.tab === 'reading') body = buildReadingTab();
  else if (S.tab === 'progress') body = buildProgressTab();

  document.getElementById('app').innerHTML =
    buildTicketHeader()
    + buildGateNav()
    + '<div class="epx-card">' + body + '</div>'
    + '<div class="epx-eyebrow" style="text-align:center;margin-top:24px;">CEFR B2–C2 ・ 語彙90語 ・ 文法90問 ・ クイズは毎回ランダムに出題 ・ 学習記録はこの端末に自動保存されます</div>';
}

function handleAction(action, el) {
  var v = S.vocab, g = S.grammar, r = S.reading;
  if (action === 'set-tab') { S.tab = el.getAttribute('data-tab'); render(); return; }
  if (action === 'set-level') { setLevel(el.getAttribute('data-level')); return; }

  if (action === 'set-vocab-mode') {
    v.mode = el.getAttribute('data-mode'); v.index=0; v.flipped=false; v.quiz=null; v.finished=false;
    render(); return;
  }
  if (action === 'flip-card') { v.flipped = !v.flipped; render(); return; }
  if (action === 'card-prev') { var pool1=vocabPool(); if (v.index>0){v.index--; v.flipped=false;} render(); return; }
  if (action === 'card-next') { var pool2=vocabPool(); if (v.index<pool2.length-1){v.index++; v.flipped=false;} render(); return; }
  if (action === 'toggle-known') {
    var pool3 = vocabPool(); var current3 = pool3[v.index];
    var set = S.progress.vocabKnownIds.slice();
    var idx = set.indexOf(current3.id);
    if (idx !== -1) set.splice(idx,1); else set.push(current3.id);
    recordActivity({ vocabKnownIds: set });
    render(); return;
  }
  if (action === 'start-vocab-quiz') {
    var pool4 = vocabPool();
    v.quiz = buildVocabQuiz(pool4, Math.min(QUIZ_SIZE, pool4.length));
    v.qIndex=0; v.selected=null; v.score=0; v.finished=false;
    render(); return;
  }
  if (action === 'select-vocab-answer') {
    if (v.selected !== null) return;
    var choiceId = el.getAttribute('data-choice');
    v.selected = choiceId;
    if (choiceId === v.quiz[v.qIndex].answerId) v.score++;
    render(); return;
  }
  if (action === 'next-vocab-question') {
    if (v.qIndex+1 >= v.quiz.length) {
      recordActivity({ vocabQuizAttempts: S.progress.vocabQuizAttempts.concat([{date:todayStr(), score:v.score, total:v.quiz.length}]) });
      v.finished = true;
    } else { v.qIndex++; v.selected=null; }
    render(); return;
  }

  if (action === 'start-grammar-quiz' || action === 'restart-grammar-quiz') {
    var allPoolG = grammarAllPool();
    g.session = shuffle(allPoolG).slice(0, Math.min(QUIZ_SIZE, allPoolG.length));
    g.qIndex = 0; g.selected = null; g.answers = []; g.finished = false;
    render(); return;
  }
  if (action === 'select-grammar-answer') {
    if (g.selected !== null) return;
    var i = parseInt(el.getAttribute('data-index'),10);
    var currentG = g.session[g.qIndex];
    g.selected = i;
    g.answers.push({ item: currentG, selectedIndex:i, correct: i===currentG.answerIndex });
    render(); return;
  }
  if (action === 'next-grammar-question') {
    if (g.qIndex+1 >= g.session.length) {
      var finalScore = g.answers.filter(function(a){return a.correct;}).length;
      recordActivity({ grammarAttempts: S.progress.grammarAttempts.concat([{date:todayStr(), score:finalScore, total:g.session.length}]) });
      g.finished = true;
    } else { g.qIndex++; g.selected=null; }
    render(); return;
  }

  if (action === 'select-passage') { r.selectedId = el.getAttribute('data-id'); r.answers = {}; render(); return; }
  if (action === 'back-to-passages') { r.selectedId = null; r.answers = {}; render(); return; }
  if (action === 'select-reading-answer') {
    var qi = parseInt(el.getAttribute('data-qi'),10);
    var ci = parseInt(el.getAttribute('data-ci'),10);
    if (r.answers[qi] !== undefined) return;
    r.answers[qi] = ci;
    var passage = READING.filter(function(p){return p.id===r.selectedId;})[0];
    var allAnswered = passage.questions.every(function(q,idx){return r.answers[idx]!==undefined;});
    if (allAnswered) {
      var score = passage.questions.filter(function(q,idx){return r.answers[idx]===q.answerIndex;}).length;
      recordActivity({ readingAttempts: S.progress.readingAttempts.concat([{passageId:passage.id, date:todayStr(), score:score, total:passage.questions.length}]) });
    }
    render(); return;
  }

  if (action === 'reset-progress') {
    if (!confirm('学習記録をすべてリセットしますか？この操作は取り消せません。')) return;
    S.progress = defaultProgress();
    saveProgress();
    render(); return;
  }
}

document.getElementById('app').addEventListener('click', function(e){
  var el = e.target.closest('[data-action]');
  if (!el) return;
  handleAction(el.getAttribute('data-action'), el);
});

render();
</script>
</body>
</html>
